<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash AI PRO</title>

<style>
body {
    background: #020617;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    max-width: 420px;
    margin: auto;
}

input {
    width: 60%;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    border-radius: 10px;
    margin: 5px;
    border: none;
    cursor: pointer;
}

.add { background: #2563eb; color: white; }
.clear { background: red; color: white; }

.box {
    display: inline-block;
    background: #1e293b;
    padding: 10px;
    margin: 4px;
    border-radius: 10px;
}

.result {
    margin-top: 20px;
    padding: 20px;
    background: linear-gradient(135deg,#020617,#0f172a);
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Crash AI PRO</h2>

<input id="num" type="number">
<button class="add" onclick="add()">Add</button>
<button class="clear" onclick="clearData()">Clear</button>

<div id="list"></div>
<div id="result" class="result">--</div>
</div>

<script>

let data = [];

function add(){
    let val = parseFloat(document.getElementById("num").value);
    if(isNaN(val)) return;

    data.push(val);
    document.getElementById("num").value="";
    render();

    if(data.length >= 5){
        analyze();
    }
}

function clearData(){
    data = [];
    render();
    document.getElementById("result").innerHTML="--";
}

function render(){
    let html="";
    data.slice(-20).forEach(x=>{
        html += `<div class="box">${x}</div>`;
    });
    document.getElementById("list").innerHTML = html;
}

async function analyze(){
    try{
        const res = await fetch("https://1-production-9423.up.railway.app/analyze", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ values:data })
        });

        const r = await res.json();

        let color = r.signal.includes("🚀") ? "#22c55e" :
                    r.signal.includes("🔥") ? "#f59e0b" :
                    r.signal.includes("⚠️") ? "#eab308" :
                    "#ef4444";

        document.getElementById("result").innerHTML = `
            <h2 style="color:${color}">${r.signal}</h2>

            <hr>

            <h3>🔮 التوقع</h3>
            <p>${r.prediction_low} → ${r.prediction_high}</p>
            <p>متوسط: ${r.next_estimate}</p>

            <hr>

            <p>Score: ${r.score}</p>
            <p>Low Streak: ${r.low_streak}</p>
            <p>AVG: ${r.avg}</p>
            <p>Volatility: ${r.volatility}</p>
        `;

    }catch(e){
        document.getElementById("result").innerHTML="❌ API Error";
    }
}

</script>

</body>
</html>
