<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash AI PRO | النسخة الذكية</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --primary: #2563eb;
            --text: #f8fafc;
            --accent: #22c55e;
        }
        body { background: var(--bg); color: var(--text); text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: var(--card); padding: 30px; border-radius: 28px; border: 1px solid #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        h2 { font-size: 24px; margin-bottom: 20px; color: var(--text); }
        input { width: 85%; padding: 16px; border-radius: 14px; border: 2px solid #1e293b; background: #020617; color: white; font-size: 22px; margin-bottom: 20px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(37, 99, 235, 0.4); }
        button { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        button:hover { background: #1d4ed8; transform: translateY(-2px); }
        button:active { transform: scale(0.98); }
        .box { display: inline-block; background: #1e293b; padding: 10px 14px; margin: 5px; border-radius: 10px; border: 1px solid #334155; font-size: 15px; font-weight: bold; animation: fadeIn 0.5s; }
        .result { margin-top: 25px; padding: 25px; background: #020617; border-radius: 20px; border: 1px solid #334155; min-height: 120px; }
        .stats { display: flex; justify-content: space-around; margin-top: 15px; font-size: 13px; color: #94a3b8; border-top: 1px solid #1e293b; padding-top: 15px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Crash AI PRO</h2>
        <input id="num" type="number" step="0.01" placeholder="أدخل الرقم الأخير..." inputmode="decimal">
        <button onclick="add()">إضافة وتحليل النمط</button>
        
        <div id="list" style="margin: 25px 0;"></div>
        
        <div id="result" class="result">
            <p style="color: #64748b;">أدخل 8 أرقام على الأقل لبدء الصيد الذكي...</p>
        </div>
    </div>

    <script>
        let data = [];

        function add() {
            const input = document.getElementById("num");
            const val = parseFloat(input.value);
            if (isNaN(val) || val <= 0) return;
            
            data.push(val);
            input.value = "";
            render();
            analyze();
        }

        function render() {
            const listDiv = document.getElementById("list");
            listDiv.innerHTML = data.slice(-10).map(x => `<div class="box">${x}x</div>`).join("");
        }

        async function analyze() {
            const resDiv = document.getElementById("result");
            if (data.length < 8) {
                resDiv.innerHTML = `<p style="color: #94a3b8;">محتاجين ${8 - data.length} أرقام كمان لضبط الـ AI...</p>`;
                return;
            }

            resDiv.innerHTML = "⏳ جاري فحص خوارزمية السيرفر...";

            try {
                const response = await fetch("https://1-production-9423.up.railway.app/api/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ values: data })
                });

                if (!response.ok) throw new Error("السيرفر لا يستجيب");

                const r = await response.json();

                if (r.error) {
                    resDiv.innerHTML = `<span style="color: #f59e0b;">${r.error}</span>`;
                    return;
                }

                // تحديد لون الإشارة بناءً على الاحتمالية
                const probValue = parseFloat(r.probability);
                const color = probValue > 70 ? "#22c55e" : (probValue > 40 ? "#f59e0b" : "#ef4444");

                resDiv.innerHTML = `
                    <h2 style="color: ${color}; margin: 0;">${r.signal}</h2>
                    <h1 style="font-size: 55px; margin: 10px 0; color: white;">${r.probability}</h1>
                    <p style="font-size: 18px; margin-bottom: 15px;">التوقع القادم: <strong style="color: #38bdf8;">${r.predicted_next}x</strong></p>
                    <div class="stats">
                        <span>الضغط: <strong>${r.pressure || '---'}</strong></span>
                        <span>الاتجاه: <strong>${r.trend || '---'}</strong></span>
                    </div>
                `;
            } catch (e) {
                resDiv.innerHTML = "<span style='color: #ef4444;'>❌ خطأ: تأكد أن Railway يعمل والرابط صحيح</span>";
                console.error("Analysis Error:", e);
            }
        }
    </script>
</body>
</html>
