<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash Analyzer PRO</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

input {
    padding: 10px;
    width: 60%;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    margin: 5px;
    cursor: pointer;
}

.add { background: #2563eb; color: white; }
.clear { background: red; color: white; }
.analyze { background: #9ca3af; }

#values {
    margin-top: 15px;
}

.box {
    display: inline-block;
    background: #1e293b;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🚀 Crash Analyzer PRO</h1>

<input type="number" id="input" placeholder="ادخل رقم">
<button class="add" onclick="addValue()">Add</button>
<br>

<button class="clear" onclick="clearAll()">Clear</button>

<div id="values"></div>

<br>

<button class="analyze" onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>

let values = [];

function addValue() {
    let val = parseFloat(document.getElementById("input").value);
    if (!val && val !== 0) return;

    values.push(val);

    let div = document.createElement("div");
    div.className = "box";
    div.innerText = val;

    document.getElementById("values").appendChild(div);
    document.getElementById("input").value = "";
}

function clearAll() {
    values = [];
    document.getElementById("values").innerHTML = "";
    document.getElementById("result").innerHTML = "";
}

async function analyze() {
    try {
        const res = await fetch("https://on-9423.up.railway.app/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                values: values
            })
        });

        if (!res.ok) throw new Error("Server error");

        const data = await res.json();

        document.getElementById("result").innerHTML = `
        <div style="background:#111827;padding:15px;border-radius:10px;margin-top:10px">
            <h2>${data.signal}</h2>
            <p>🎯 Target: ${data.target}</p>
            <p>📊 Confidence: ${data.confidence}</p>
            <p>AVG: ${data.avg}</p>
            <p>MAX: ${data.max}</p>
            <p>MIN: ${data.min}</p>
        </div>
        `;

    } catch (err) {
        console.log(err);
        alert("❌ مشكلة في الاتصال بال API");
    }
}

</script>

</body>
</html>
