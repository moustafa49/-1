<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash AI</title>

<style>
body { background:#0b0f1a; color:white; text-align:center; font-family:Arial; }
.container { max-width:420px; margin:auto; }

input { padding:10px; width:60%; border-radius:10px; border:none; }
button { padding:10px; border-radius:10px; margin:5px; border:none; cursor:pointer; }

.add { background:#2563eb; color:white; }
.clear { background:red; color:white; }

.box {
    display:inline-block;
    background:#1e293b;
    padding:8px;
    margin:4px;
    border-radius:8px;
}

.result {
    margin-top:20px;
    padding:15px;
    background:#111827;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Crash AI Predictor</h2>

<input id="num" type="number">
<button class="add" onclick="add()">Add</button>
<button class="clear" onclick="clearData()">Clear</button>

<div id="list"></div>
<div class="result" id="result">--</div>
</div>

<script>

let data = [];

function add(){
    let val = parseFloat(document.getElementById("num").value);
    if(isNaN(val)) return;

    data.push(val);
    document.getElementById("num").value="";
    render();

    if(data.length >= 3){
        analyze();
    }
}

function clearData(){
    data = [];
    render();
    document.getElementById("result").innerHTML="--";
}

function render(){
    let html="";
    data.slice(-20).forEach(x=>{
        html += `<div class="box">${x}</div>`;
    });
    document.getElementById("list").innerHTML = html;
}

async function analyze(){
    try{
        const res = await fetch("https://1-production-9423.up.railway.app/analyze", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ values:data })
        });

        const r = await res.json();

        document.getElementById("result").innerHTML = `
            <h2>${r.signal}</h2>
            <p>${r.trend}</p>

            <hr>

            <h3>🔮 التوقع القادم</h3>
            <p>من: ${r.prediction_low}</p>
            <p>إلى: ${r.prediction_high}</p>
            <p>متوسط: ${r.next_estimate}</p>

            <hr>

            <p>AVG: ${r.avg}</p>
            <p>Momentum: ${r.momentum}</p>
            <p>Pressure: ${r.pressure}</p>
            <p>Volatility: ${r.volatility}</p>
        `;

    }catch(e){
        document.getElementById("result").innerHTML="❌ API Error";
    }
}

</script>

</body>
</html>
