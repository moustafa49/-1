<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash Analyzer PRO+</title>

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    max-width: 420px;
    margin: auto;
}

input {
    width: 65%;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    border-radius: 10px;
    margin: 5px;
    border: none;
}

.add { background: #2563eb; color: white; }
.clear { background: red; color: white; }

.grid { margin-top: 10px; }

.box {
    display: inline-block;
    background: #1e293b;
    padding: 10px;
    margin: 4px;
    border-radius: 10px;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #111827;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Crash Analyzer PRO+</h2>

<input id="num" type="number" placeholder="ادخل رقم">
<button class="add" onclick="add()">Add</button>
<button class="clear" onclick="clearData()">Clear</button>

<div class="grid" id="list"></div>

<div class="result" id="result">--</div>
</div>

<script>

let data = [];

function add(){
    let val = parseFloat(document.getElementById("num").value);
    if (!val && val !== 0) return;

    data.push(val);
    document.getElementById("num").value="";
    render();

    if(data.length >= 3){
        analyze();
    }
}

function clearData(){
    data = [];
    render();
    document.getElementById("result").innerHTML="--";
}

function render(){
    let html="";
    data.slice(-20).forEach(x=>{
        html += `<div class="box">${x}</div>`;
    });
    document.getElementById("list").innerHTML = html;
}

async function analyze(){
    try{
        const res = await fetch("https://1-production-9423.up.railway.app/analyze", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ values: data })
        });

        const r = await res.json();

        let trend = "ثابت";
        if(data.length >= 2){
            trend = data[data.length-1] > data[data.length-2] ? "📈 صاعد" : "📉 هابط";
        }

        let color = r.signal.includes("قوي") ? "#22c55e" : "#ef4444";

        document.getElementById("result").innerHTML = `
            <h3 style="color:${color}">${r.signal}</h3>
            <p>🎯 ${r.target}</p>
            <p>📊 ${r.confidence}</p>
            <p>📈 Trend: ${r.trend}</p>
            <p>⚡ Momentum: ${r.momentum}</p>
            <p>🔥 Ratio: ${r.ratio}</p>
            <p>🌊 Volatility: ${r.volatility}</p>
            <p>AVG: ${r.avg}</p>
            <p>MAX: ${r.max}</p>
            <p>MIN: ${r.min}</p>
        `;

    }catch(e){
        console.log(e);
        document.getElementById("result").innerHTML = "❌ API Error";
    }
}

</script>

</body>
</html>
