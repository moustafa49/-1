<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash AI PRO</title>
    <style>
        body { background:#020617; color:white; text-align:center; font-family: sans-serif; padding:20px; }
        .container { max-width:400px; margin:auto; background:#0f172a; padding:25px; border-radius:25px; border:1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width:80%; padding:15px; border-radius:12px; border:2px solid #1e293b; background:#020617; color:white; font-size:20px; margin-bottom:15px; outline:none; }
        button { width:100%; padding:15px; border-radius:12px; border:none; background:#2563eb; color:white; font-weight:bold; cursor:pointer; font-size:16px; transition:0.3s; }
        button:active { transform: scale(0.98); }
        .box { display:inline-block; background:#1e293b; padding:8px 12px; margin:4px; border-radius:8px; border:1px solid #334155; font-size:14px; }
        .result { margin-top:20px; padding:20px; background:#020617; border-radius:15px; border:1px solid #334155; min-height:100px; }
        hr { border:0; border-top:1px solid #1e293b; margin:15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Crash AI PRO</h2>
        <input id="num" type="number" step="0.01" placeholder="أدخل الرقم الأخير..." inputmode="decimal">
        <button onclick="add()">إضافة وتحليل النمط</button>
        <div id="list" style="margin:20px 0;"></div>
        <div id="result" class="result">في انتظار البيانات...</div>
    </div>

    <script>
        let data = [];
        function add() {
            let val = parseFloat(document.getElementById("num").value);
            if(isNaN(val)) return;
            data.push(val);
            document.getElementById("num").value = "";
            render();
            analyze();
        }
        function render() {
            document.getElementById("list").innerHTML = data.slice(-10).map(x => `<div class="box">${x}x</div>`).join("");
        }
        async function analyze() {
            if(data.length < 5) {
                document.getElementById("result").innerHTML = `محتاجين ${5 - data.length} أرقام كمان...`;
                return;
            }
            const resDiv = document.getElementById("result");
            resDiv.innerHTML = "⏳ جاري التحليل الذكي...";
            try {
                const response = await fetch("https://1-production-9423.up.railway.app/api/analyze", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ values: data })
                });
                const r = await response.json();
                if(r.error) {
                    resDiv.innerHTML = `<span style="color:orange">${r.error}</span>`;
                    return;
                }
                resDiv.innerHTML = `
                    <h2 style="color:#22c55e">${r.signal}</h2>
                    <h1 style="font-size:45px; margin:10px 0;">${r.probability}</h1>
                    <p>التوقع القادم: <strong>${r.predicted_next}x</strong></p>
                    <hr>
                    <div style="display:flex; justify-content:space-around; font-size:12px; color:#94a3b8;">
                        <span>الاتجاه: ${r.trend}</span>
                        <span>الضغط: ${r.pressure_level}</span>
                    </div>
                `;
            } catch(e) {
                resDiv.innerHTML = "❌ خطأ في الاتصال بسيرفر Railway";
            }
        }
    </script>
</body>
</html>
