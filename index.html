<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash Analyzer PRO</title>

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    max-width: 400px;
    margin: auto;
}

input {
    width: 70%;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin: 5px;
    cursor: pointer;
}

.add { background: #2563eb; color: white; }
.clear { background: red; color: white; }

.box {
    background: #1a2238;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    display: inline-block;
}
</style>
</head>

<body>

<h1>🚀 Crash Analyzer PRO</h1>

<input type="number" id="input" placeholder="ادخل رقم">
<button class="add" onclick="addValue()">Add</button>
<br>
<button class="clear" onclick="clearAll()">Clear</button>

<div id="values"></div>

<br>
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>
let values = [];

function addValue() {
    let val = parseFloat(document.getElementById("input").value);
    if (!val) return;

    values.push(val);

    let div = document.createElement("div");
    div.className = "box";
    div.innerText = val;
    document.getElementById("values").appendChild(div);

    document.getElementById("input").value = "";
}

function clearAll() {
    values = [];
    document.getElementById("values").innerHTML = "";
    document.getElementById("result").innerHTML = "";
}

async function analyze() {
    const res = await fetch("https://YOUR-RAILWAY-LINK/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ values: values })
    });

    const data = await res.json();

    document.getElementById("result").innerHTML = `
        <h2>${data.signal}</h2>
        <p>Target: ${data.target}</p>
        <p>Confidence: ${data.confidence}</p>
        <p>AVG: ${data.avg}</p>
        <p>MAX: ${data.max}</p>
        <p>MIN: ${data.min}</p>
    `;
}
</script>

</body>
</html>
