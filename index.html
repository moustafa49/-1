<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash AI PRO</title>
    <style>
        body { background:#020617; color:white; text-align:center; font-family: sans-serif; padding:20px;}
        .container { max-width:400px; margin:auto; background:#0f172a; padding:20px; border-radius:20px; border: 1px solid #1e293b;}
        input { width:70%; padding:12px; border-radius:10px; border:none; margin-bottom:10px; text-align:center; font-size:18px;}
        button { width:100%; padding:12px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; margin:5px 0;}
        .add { background:#2563eb; color:white; }
        .box { display:inline-block; background:#1e293b; padding:5px 10px; margin:3px; border-radius:5px; font-size:12px;}
        .result { margin-top:20px; padding:15px; background:#020617; border-radius:15px; border: 1px solid #334155;}
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Crash AI PRO</h2>
        <input id="num" type="number" step="0.01" placeholder="أدخل الرقم...">
        <button class="add" onclick="add()">تحليل النمط</button>
        <div id="list" style="margin:15px 0;"></div>
        <div id="result" class="result">في انتظار البيانات...</div>
    </div>

    <script>
        let data = [];
        function add(){
            let val = parseFloat(document.getElementById("num").value);
            if(isNaN(val)) return;
            data.push(val);
            document.getElementById("num").value="";
            render();
            analyze();
        }
        function render(){
            document.getElementById("list").innerHTML = data.slice(-10).map(x => `<div class="box">${x}x</div>`).join("");
        }
        async function analyze(){
            if(data.length < 5) return;
            const resDiv = document.getElementById("result");
            resDiv.innerHTML = "⏳ جاري التحليل...";
            try {
                // اااااا مهم جداً: غير الرابط ده لرابط الـ Railway بتاعك اااااا
                const response = await fetch("https://اسم-مشروعك.railway.app/api/analyze", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ values: data })
                });
                const r = await response.json();
                resDiv.innerHTML = `
                    <h2 style="color:#22c55e">${r.signal}</h2>
                    <h1>${r.probability}</h1>
                    <p>التوقع: ${r.predicted_next}x</p>
                    <hr>
                    <small>الضغط: ${r.pressure_level} | الاتجاه: ${r.trend}</small>
                `;
            } catch(e) { resDiv.innerHTML = "❌ خطأ في الاتصال بالسيرفر"; }
        }
    </script>
</body>
</html>
