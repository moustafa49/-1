<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash Analyzer PRO</title>

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.container {
    max-width: 400px;
    margin: auto;
}

input {
    width: 70%;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    border-radius: 10px;
    margin: 5px;
    cursor: pointer;
}

.add { background: blue; color: white; }
.clear { background: red; color: white; }

.box {
    background: #111827;
    padding: 15px;
    margin-top: 15px;
    border-radius: 15px;
}
</style>
</head>

<body>

<h1>🚀 Crash Analyzer PRO</h1>

<div class="container">
    <input id="num" placeholder="أدخل رقم">
    <button class="add" onclick="add()">Add</button>
    <button class="clear" onclick="clearAll()">Clear</button>

    <div id="list"></div>

    <div class="box" id="result">--</div>
</div>

<script>
let numbers = [];

function add() {
    let val = parseFloat(document.getElementById("num").value);
    if (!isNaN(val)) {
        numbers.push(val);
        render();
    }
}

function clearAll() {
    numbers = [];
    render();
    document.getElementById("result").innerHTML = "--";
}

function render() {
    document.getElementById("list").innerHTML = numbers.join(" | ");
    analyze();
}

function analyze() {
    fetch("https://1-production-9423.up.railway.app/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ numbers })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML = `
            AVG: ${data.avg} <br>
            MAX: ${data.max} <br>
            MIN: ${data.min} <br>
            🔥 ${data.signal}
        `;
    });
}
</script>

</body>
</html>
