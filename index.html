<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash AI PRO</title>

<style>
body { background:#020617; color:white; text-align:center; font-family:Arial;}
.container { max-width:420px; margin:auto;}
input { width:60%; padding:12px; border-radius:10px;}
button { padding:12px; border-radius:10px; margin:5px; border:none; cursor:pointer;}
.add {background:#2563eb;color:white;}
.clear {background:red;color:white;}
.box {display:inline-block;background:#1e293b;padding:10px;margin:4px;border-radius:10px;}
.result {margin-top:20px;padding:20px;background:#0f172a;border-radius:20px;}
</style>
</head>

<body>

<div class="container">
<h2>🚀 Crash AI PRO</h2>

<input id="num" type="number">
<button class="add" onclick="add()">Add</button>
<button class="clear" onclick="clearData()">Clear</button>

<div id="list"></div>
<div id="result" class="result">--</div>
</div>

<script>

let data = [];

function add(){
    let val = parseFloat(document.getElementById("num").value);
    if(isNaN(val)) return;

    data.push(val);
    document.getElementById("num").value="";
    render();
    analyze();
}

function clearData(){
    data=[];
    render();
    document.getElementById("result").innerHTML="--";
}

function render(){
    let html="";
    data.slice(-30).forEach(x=>{
        html+=`<div class="box">${x}</div>`;
    });
    document.getElementById("list").innerHTML=html;
}

async function analyze(){
    try{
        document.getElementById("result").innerHTML="⏳ تحليل...";

        const res = await fetch("https://YOUR-API-LINK/analyze", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({values:data})
        });

        const r = await res.json();

        if(r.error){
            document.getElementById("result").innerHTML="⏳ بيانات أكتر";
            return;
        }

        let color = r.probability > 70 ? "#22c55e" :
                    r.probability > 50 ? "#f59e0b" :
                    "#ef4444";

        document.getElementById("result").innerHTML=`
            <h2 style="color:${color}">${r.signal}</h2>
            <h3>${r.probability}%</h3>

            <p>🔮 ${r.predicted}</p>
            <p>${r.range_low} → ${r.range_high}</p>

            <hr>

            <p>AVG: ${r.avg}</p>
            <p>Momentum: ${r.momentum}</p>
            <p>Volatility: ${r.volatility}</p>
        `;

    }catch(e){
        document.getElementById("result").innerHTML="❌ API Error";
    }
}

</script>

</body>
</html>
