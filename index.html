<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash AI PRO - Smart Edition</title>

<style>
    body { background:#020617; color:white; text-align:center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:15px;}
    .container { max-width:450px; margin:auto; background:#0f172a; padding:20px; border-radius:25px; border: 1px solid #1e293b; box-shadow: 0 15px 35px rgba(0,0,0,0.6);}
    h2 { color: #3b82f6; letter-spacing: 1px; margin-bottom: 20px; }
    input { width:70%; padding:15px; border-radius:15px; border:2px solid #1e293b; background:#020617; color:white; font-size:20px; outline:none; transition: 0.3s; text-align: center;}
    input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    .btn-group { margin: 15px 0; display: flex; gap: 10px; justify-content: center; }
    button { flex:1; padding:15px; border-radius:12px; border:none; cursor:pointer; font-weight:bold; font-size:16px; transition: 0.3s; }
    .add { background:#2563eb; color:white; }
    .add:active { transform: scale(0.95); }
    .clear { background:#334155; color:white; max-width: 80px; }
    .box { display:inline-block; background:#1e293b; padding:8px 12px; margin:4px; border-radius:10px; border: 1px solid #334155; font-weight: bold; color: #94a3b8; }
    
    .result { margin-top:20px; padding:25px; background:#020617; border-radius:20px; border: 1px solid #334155; min-height: 150px; position: relative; overflow: hidden;}
    .prob-bar-bg { background: #1e293b; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; }
    .prob-bar-fill { background: #2563eb; height: 100%; width: 0%; transition: 1s ease-in-out; }
    
    .stat-row { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #1e293b; padding-top: 15px; }
    .stat-box { text-align: center; flex: 1; }
    .stat-label { font-size: 12px; color: #64748b; display: block; }
    .stat-val { font-weight: bold; color: #f8fafc; }
    
    .pulse { animation: pulse-animation 2s infinite; }
    @keyframes pulse-animation { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
</style>
</head>

<body>

<div class="container">
    <h2>🚀 Crash AI PRO</h2>

    <input id="num" type="number" step="0.01" placeholder="أدخل الرقم الأخير..." inputmode="decimal">
    
    <div class="btn-group">
        <button class="add" onclick="add()">إضافة وتحليل</button>
        <button class="clear" onclick="clearData()">مسح</button>
    </div>

    <div id="list"></div>

    <div id="result" class="result">
        <p style="color:#64748b;">في انتظار البيانات للبدء...</p>
    </div>
</div>

<script>
let data = [];

function add(){
    let val = parseFloat(document.getElementById("num").value);
    if(isNaN(val)) return;

    data.push(val);
    document.getElementById("num").value="";
    render();
    analyze();
}

function clearData(){
    data=[];
    render();
    document.getElementById("result").innerHTML='<p style="color:#64748b;">تم مسح الذاكرة</p>';
}

function render(){
    let html="";
    data.slice(-12).forEach(x=>{
        html+=`<div class="box">${x}x</div>`;
    });
    document.getElementById("list").innerHTML=html;
}

async function analyze(){
    const resDiv = document.getElementById("result");
    if(data.length < 5) {
        resDiv.innerHTML = `<p class="pulse" style="color:#3b82f6;">محتاجين ${5 - data.length} أرقام كمان...</p>`;
        return;
    }

    try {
        resDiv.innerHTML = '<p class="pulse">🧠 جاري معالجة الأنماط...</p>';

        const response = await fetch("/api/analyze", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ values: data })
        });

        const r = await response.json();

        if(r.error) {
            resDiv.innerHTML = `<p style="color:#ef4444;">${r.error}</p>`;
            return;
        }

        // تحويل النسبة لرقم
        let prob = parseFloat(r.probability);
        let color = prob > 75 ? "#22c55e" : prob > 45 ? "#f59e0b" : "#ef4444";

        resDiv.innerHTML = `
            <div style="font-size: 14px; color: #94a3b8; margin-bottom: 5px;">الحالة الحالية</div>
            <h2 style="color:${color}; margin:0; font-size: 28px;">${r.signal}</h2>
            
            <div class="prob-bar-bg">
                <div class="prob-bar-fill" style="width:${prob}%; background:${color}"></div>
            </div>
            
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:32px; font-weight:bold;">${r.probability}</span>
                <div style="text-align:right;">
                    <span class="stat-label">التوقع القادم</span>
                    <span style="font-size:20px; color:#3b82f6; font-weight:bold;">${r.predicted_next}x</span>
                </div>
            </div>

            <div class="stat-row">
                <div class="stat-box">
                    <span class="stat-label">📈 الاتجاه</span>
                    <span class="stat-val">${r.trend}</span>
                </div>
                <div class="stat-box" style="border-left: 1px solid #1e293b;">
                    <span class="stat-label">🎈 الضغط</span>
                    <span class="stat-val">${r.pressure_level}</span>
                </div>
            </div>
        `;

    } catch (e) {
        resDiv.innerHTML = '<p style="color:#ef4444;">❌ فشل الاتصال بالسيرفر الذكي</p>';
    }
}
</script>

</body>
</html>
